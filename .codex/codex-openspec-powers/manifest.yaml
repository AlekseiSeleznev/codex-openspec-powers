version: 1
template: codex-openspec-powers

repairSources:
  root: .codex/codex-openspec-powers/template
  pathRule: "For every templateOwnedPaths target except the source bundle itself, the bundled repair source is root + '/' + target path."
  exclude:
    - .codex/codex-openspec-powers/template/**

precedence:
  - Specific templateOwnedPaths entries override containing mergeReviewPaths or generatedPaths.
  - Unclassified files are informational only and must not be repaired silently.

templateOwnedPaths:
  - .codex/codex-openspec-powers/manifest.yaml
  - .codex/codex-openspec-powers/claude-review.yaml
  - .codex/codex-openspec-powers/template/**
  - .codex/prompts/opsx-init.md
  - .codex/prompts/opsx-new.md
  - .codex/prompts/opsx-propose.md
  - .codex/prompts/opsx-continue.md
  - .codex/prompts/opsx-explore.md
  - .codex/prompts/opsx-apply.md
  - .codex/prompts/opsx-verify.md
  - .codex/prompts/opsx-sync.md
  - .codex/prompts/opsx-archive.md
  - .codex/prompts/opsx-ff.md
  - .codex/prompts/opsx-bulk-archive.md
  - .codex/prompts/opsx-check-overlay.md
  - .codex/prompts/opsx-claude-review.md
  - .codex/skills/architectural-decision-records/**
  - .codex/skills/c4-diagrams/**
  - .codex/skills/gherkin-authoring/**
  - .codex/skills/grill-with-docs/**
  - .codex/skills/openspec-git-discipline/**
  - INSTALL_CODEX_TEMPLATE.md

generatedPaths:
  - .codex/skills/openspec-*

mergeReviewPaths:
  - .codex/
  - .codex/prompts/
  - .codex/skills/
  - .gitignore
  - AGENTS.md
  - README.md
  - README.en.md
  - openspec/config.yaml
  - openspec/schemas/

neverOverwritePaths:
  - openspec/changes/
  - openspec/specs/
  - package.json
  - pyproject.toml
  - Cargo.toml
  - go.mod
  - src/
  - tests/
  - docs/

forbiddenPaths: []

requiredPrompts:
  - .codex/prompts/opsx-init.md
  - .codex/prompts/opsx-new.md
  - .codex/prompts/opsx-propose.md
  - .codex/prompts/opsx-continue.md
  - .codex/prompts/opsx-explore.md
  - .codex/prompts/opsx-apply.md
  - .codex/prompts/opsx-verify.md
  - .codex/prompts/opsx-sync.md
  - .codex/prompts/opsx-archive.md
  - .codex/prompts/opsx-ff.md
  - .codex/prompts/opsx-bulk-archive.md
  - .codex/prompts/opsx-check-overlay.md
  - .codex/prompts/opsx-claude-review.md

requiredMarkers:
  - id: post-step-lessons
    paths:
      - .codex/prompts/opsx-init.md
      - .codex/prompts/opsx-new.md
      - .codex/prompts/opsx-propose.md
      - .codex/prompts/opsx-continue.md
      - .codex/prompts/opsx-explore.md
      - .codex/prompts/opsx-apply.md
      - .codex/prompts/opsx-verify.md
      - .codex/prompts/opsx-sync.md
      - .codex/prompts/opsx-archive.md
      - .codex/prompts/opsx-ff.md
      - .codex/prompts/opsx-bulk-archive.md
      - .codex/prompts/opsx-check-overlay.md
      - .codex/prompts/opsx-claude-review.md
    markers:
      - "**== УРОКИ ==**"
      - "**== СЛЕДУЮЩИЙ ШАГ ==**"
  - id: ordinary-skill-consent
    paths:
      - .codex/prompts/opsx-new.md
      - .codex/prompts/opsx-propose.md
      - .codex/prompts/opsx-continue.md
      - .codex/prompts/opsx-explore.md
      - .codex/prompts/opsx-apply.md
      - .codex/prompts/opsx-verify.md
      - .codex/prompts/opsx-archive.md
      - .codex/prompts/opsx-ff.md
    markers:
      - "**== РЕКОМЕНДАЦИЯ ==**"
      - "Вызвать"
      - "Выполнить?"
      - "**Да / Нет**"
  - id: superpowers-consent
    paths:
      - .codex/prompts/opsx-new.md
      - .codex/prompts/opsx-propose.md
      - .codex/prompts/opsx-continue.md
      - .codex/prompts/opsx-explore.md
      - .codex/prompts/opsx-ff.md
      - .codex/prompts/opsx-apply.md
      - .codex/prompts/opsx-verify.md
      - .codex/prompts/opsx-archive.md
    markers:
      - "**== РЕКОМЕНДАЦИЯ ==**"
      - "Использовать"
      - "Использовать?"
      - "**Да / Нет**"
  - id: recommendation-selection-gate
    paths:
      - .codex/prompts/opsx-new.md
      - .codex/prompts/opsx-propose.md
      - .codex/prompts/opsx-continue.md
      - .codex/prompts/opsx-explore.md
      - .codex/prompts/opsx-ff.md
      - .codex/prompts/opsx-apply.md
      - .codex/prompts/opsx-verify.md
      - .codex/prompts/opsx-archive.md
    markers:
      - "Recommendation selection rule:"
      - "do not render one block per candidate"
      - "Do not silently omit listed recommendations."
      - "Есть необязательные шаги, которые могут"
      - "Что выполнить?"
      - "Ответьте одним из вариантов:"
      - "Use this rendered shape."
      - "do not render sample text as a real recommendation"
      - "○ 1:"
      - "○ +"
      - "○ -"
      - "Совместимость с **Да / Нет**"
      - "Recommendation response handling rule:"
      - "Interpret comma-separated numbers"
      - "make `**== СЛЕДУЮЩИЙ ШАГ ==**` account"
  - id: claude-review-status
    paths:
      - .codex/prompts/opsx-propose.md
      - .codex/prompts/opsx-apply.md
      - .codex/prompts/opsx-verify.md
      - .codex/prompts/opsx-archive.md
      - .codex/prompts/opsx-claude-review.md
    markers:
      - "**== РЕВЬЮ CLAUDE ==**"
  - id: overlay-repair-recommendation
    paths:
      - .codex/prompts/opsx-check-overlay.md
    markers:
      - "**== РЕКОМЕНДАЦИЯ ==**"

