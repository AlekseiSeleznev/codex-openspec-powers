healthcheckFixtures:
  - missing init prompt: expect missing .codex/prompts/opsx-init.md before marker validation
  - missing footer markers: expect missing "**== УРОКИ ==**" and "**== СЛЕДУЮЩИЙ ШАГ ==**"
  - missing manifest: expect broken overlay installation
  - missing required prompt: expect prompt absence before marker validation
  - overwritten required prompt with bundled source available: expect repair plan copying the prompt from repairSources.root after user confirmation
  - missing repair source bundle: expect broken source bundle report and instruction to re-apply the template
  - missing consent wording: expect missing "Выполнить?", "Использовать?", or "**Да / Нет**"
  - missing recommendation selection gate: expect missing "Recommendation selection rule:"
  - missing or malformed claude-review.yaml: expect broken Claude review config
  - missing Claude review substep marker: expect missing "**== РЕВЬЮ CLAUDE ==**"
  - missing propose Claude review marker: expect missing "**== РЕВЬЮ CLAUDE ==**" in opsx-propose.md
  - templateOwnedPaths override broader classifications: expect missing .codex/prompts/opsx-new.md to be treated as broken template-owned content while unlisted .codex/prompts/user-foo.md is preserved informational
  - unresolved Critical/High blocker: expect apply/archive gate blocked
  - Claude review budget limit reached: expect externally unreviewed or incomplete
  - Claude review pre-call bundle limit exceeded: expect no claude invocation
  - unavailable or failing Claude CLI: expect externally unreviewed
  - unknown Claude review stage: expect rejection before any claude invocation
  - broad Claude review scope: expect rejection of directories, broad globs, and repository root
  - autoApplySafeDocFixes false: expect consent before any doc-only fix
  - mid-call Claude failure: expect externally unreviewed or incomplete
  - opsx-check-overlay missing repair recommendation marker: expect broken repair UX
  - utility-only prompt without consent wording: expect no issue unless snippet listed
  - user-added file inside merge-review directory: expect preserved informational report
